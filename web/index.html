<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="archive_of_oblivion">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>archive_of_oblivion</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <style>
    #archive-flutter-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 34%, rgba(233, 227, 214, 0.08), transparent 34%),
        linear-gradient(180deg, #05070b 0%, #0c0f15 48%, #030406 100%);
      color: #e9e3d6;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: 0.08em;
      text-align: center;
      transition: opacity 420ms ease, filter 420ms ease;
    }

    #archive-flutter-loader.archive-loader-exit {
      opacity: 0;
      filter: blur(14px);
      pointer-events: none;
    }

    #archive-flutter-loader .archive-loader-text {
      font-size: clamp(1rem, 2.2vw, 1.55rem);
      animation: archive-materialize 2.4s ease-in-out infinite;
      text-shadow: 0 0 22px rgba(233, 227, 214, 0.26);
    }

    @keyframes archive-materialize {
      0%, 100% {
        opacity: 0.46;
        filter: blur(5px);
        transform: translateY(2px);
      }
      50% {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }
  </style>

  <div id="archive-flutter-loader" aria-live="polite" aria-busy="true">
    <div class="archive-loader-text">The Archive is materializing...</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function removeArchiveLoader() {
      var loader = document.getElementById('archive-flutter-loader');
      if (!loader) return;
      loader.classList.add('archive-loader-exit');
      window.setTimeout(function () {
        loader.remove();
      }, 460);
    }, { once: true });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
