name: archive_of_oblivion
description: L'Archivio dell'Oblio — psycho-philosophical text adventure webapp for Itch.io.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  sqflite_common: ^2.5.6
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^1.0.0
  path: ^1.9.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/texts/
    - assets/texts/demiurge/
    - assets/prompts/
    - assets/images/bg_soglia.jpg
    - assets/images/bg_giardino.jpg
    - assets/images/bg_osservatorio.jpg
    - assets/images/bg_galleria.jpg
    - assets/images/bg_laboratorio.jpg
    - assets/images/bg_memoria.jpg
    - assets/images/bg_zona.jpg
    # assets/llm/ escluso — modelli .gguf troppo grandi per git
